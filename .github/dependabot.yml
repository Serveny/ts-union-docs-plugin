version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: "19:30"
      timezone: Europe/Berlin
    allow:
      - dependency-name: typescript
    ignore:
      - dependency-name: typescript
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - typescript
